{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Gestión de Servicios de Salud</h2>
    
    <div class="card p-4 mb-4">
        <h4>Añadir Nuevo Servicio</h4>
        <form action="/agregar_servicio" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="nombre" class="form-control" placeholder="Nombre del servicio" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="especialidad" class="form-control" placeholder="Especialidad" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" name="costo" class="form-control" placeholder="Costo" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Guardar</button>
            </div>
        </form>
    </div>

    <h4>Servicios Disponibles</h4>
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Servicio</th>
                <th>Especialidad</th>
                <th>Costo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for s in servicios %}
            <tr>
                <td>{{ s.nombre }}</td>
                <td>{{ s.especialidad }}</td>
                <td>${{ s.costo }}</td>
                <td>
                    <a href="/eliminar/{{ s.id }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
